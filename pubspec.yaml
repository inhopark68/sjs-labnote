name: labnote
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  cupertino_icons: ^1.0.8
  provider: ^6.0.0
  shared_preferences: ^2.2.3

  drift: ^2.32.0
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0+eol

  mobile_scanner: ^7.2.0

  image_picker: ^1.0.8
  flutter_quill: ^11.0.0
  flutter_quill_extensions: ^11.0.0
  flutter_image_compress: ^2.1.0
  google_mlkit_text_recognition: ^0.15.1
  google_mlkit_barcode_scanning: ^0.14.1

  dart_quill_delta: ^10.8.3
  image: ^4.2.0

  archive: ^4.0.9
  crypto: ^3.0.3
  encrypt: ^5.0.1

  path_provider: ^2.1.2
  path: ^1.9.0

  media_store_plus: ^0.1.3
  file_picker: ^10.3.10
  js: ^0.6.7
  idb_shim: ^2.6.0+1
  share_plus: ^12.0.1
  url_launcher: ^6.3.0

  camera: ^0.12.0
  camera_windows: ^0.2.6+3

  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.32.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true



#   A couple of notes:

# I kept image_picker: ^1.0.8 since it’s the newer of the two versions you listed.

