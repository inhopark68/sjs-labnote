name: labnote
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.0.0
  shared_preferences: ^2.2.3

  # Local DB (Drift + SQLite)
  drift: ^2.32.0
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0+eol

  # Scan (Camera / QR / Barcode)
  mobile_scanner: ^7.2.0

  # OCR + Photo
  image_picker: ^1.0.7
  google_mlkit_text_recognition: ^0.15.1

  # Image processing (pure Dart)
  image: ^4.1.0

  # Backup/Restore (zip + checksum)
  archive: ^4.0.9
  crypto: ^3.0.3
  encrypt: ^5.0.1

  # File paths
  path_provider: ^2.1.2
  path: ^1.9.0

  # Android export to Downloads
  media_store_plus: ^0.1.3

  # Restore: pick backup zip
  file_picker: ^10.3.10

  # Web/IndexedDB (모바일 중심이면 실제 사용 안 할 수 있음)
  idb_shim: ^2.6.0+1
  share_plus: ^12.0.1
  url_launcher: ^6.3.0

  # Camera
  camera: ^0.12.0
  camera_windows: ^0.2.6+3

  # HTTP
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  drift_dev: ^2.32.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true